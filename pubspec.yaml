name: flodo_tasks
description: Flodo AI take-home — polished Task Management app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Local database — FFI-based, works on Windows without symlinks/Developer Mode
  sqflite_common_ffi: ^2.3.3
  path: ^1.9.0

  # Draft persistence
  shared_preferences: ^2.2.3

  # Utilities
  uuid: ^4.4.0
  intl: ^0.19.0

  # Animations (declarative API, zero boilerplate)
  flutter_animate: ^4.5.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
